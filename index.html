
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<style>
body {
    font-family: Arial;
    background: #f7fbff;
    color: black;
    text-align: center;
    padding: 30px;
}

table {
    border-collapse: collapse;
    width: 70%;
    margin: auto;
    background: white;
}

th, td {
    padding: 12px;
    border: 1px solid #ddd;
}

th {
    background: #eef5fb;
}

tr:nth-child(even) {
    background: #f4f7fa;
}

.gold { background-color: #FFD700; font-weight: bold; }
.silver { background-color: #C0C0C0; font-weight: bold; }
.bronze { background-color: #CD7F32; font-weight: bold; }

.stats {
    margin-top: 40px;
}
</style>
</head>

<body>

<h1>🏆 Leaderboard</h1>

<table>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Accuracy</th>
<th>F1-score</th>
</tr>

    <tr class="gold">
        <td>🥇 1</td>
        <td>farahgaber</td>
        <td>6.49</td>
        <td>6.2400</td>
    </tr>
    
    <tr class="silver">
        <td>🥈 2</td>
        <td>AlyaaGibreel</td>
        <td>6.47</td>
        <td>6.3400</td>
    </tr>
    
</table>

<div class="stats">
<h2>📊 Statistics</h2>

<p><b>Participants:</b> 2</p>

<p><b>Accuracy:</b> Max 6.49 | Min 6.47 | 
Mean 6.48 | Median 6.48 | Std 0.01</p>

<p><b>F1-score:</b> Max 6.3400 | Min 6.2400 | 
Mean 6.2900 | Median 6.2900 | Std 0.0707</p>

</div>

</body>
</html>
